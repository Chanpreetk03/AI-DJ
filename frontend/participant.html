<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join AI-DJ</title>
  </head>
  <body>
    <nav class="app-nav" aria-label="AI-DJ navigation">
      <a href="/">Home</a><a href="/output.html">Output</a><a href="/participant.html" aria-current="page">Join room</a><a href="/booth.html">Booth</a><a href="/status.html">Status</a>
    </nav>
    <main class="panel participant-panel">
      <p class="eyebrow">Audience phone mode</p>
      <h1>Move with the music.</h1>
      <p class="muted">Your camera and microphone stay on this phone. Only lightweight vibe numbers join the room.</p>
      <label class="name-field" for="participant-name">
        <span>Your name</span>
        <input id="participant-name" type="text" autocomplete="name" maxlength="24" placeholder="e.g. Maya" />
      </label>
      <button id="join-button" class="button participant-join-button" type="button">Join the room</button>
      <button id="leave-button" class="button secondary participant-leave-button" type="button" hidden>Leave the room</button>
      <p id="status" class="status">Not connected</p>
      <section class="participant-camera-stage">
        <div id="participant-energy" class="participant-energy-ring">
          <video id="camera" autoplay muted playsinline></video>
        </div>
      </section>
      <p id="contribution" class="contribution">Waiting for permission and connection</p>
      <div class="meters participant-meters">
        <label>Motion <meter id="motion-meter" min="0" max="1" value="0"></meter></label>
        <label>Sound <meter id="audio-meter" min="0" max="1" value="0"></meter></label>
      </div>
    </main>
    <script type="module" src="/src/participant.ts"></script>
  </body>
</html>
