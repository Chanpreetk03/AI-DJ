<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-DJ Output</title>
  </head>
  <body>
    <main class="panel output-panel">
      <p class="eyebrow">Output tab</p>
      <h1>Room is listening.</h1>
      <p id="status" class="status">Connecting…</p>
      <div class="energy-ring" id="energy-ring"><span id="energy-value">0%</span></div>
      <div class="stats">
        <div><span>Tempo</span><strong id="tempo">92 BPM</strong></div>
        <div><span>Layers</span><strong id="layers">1 / 4</strong></div>
        <div><span>Cutoff</span><strong id="cutoff">18%</strong></div>
      </div>
      <button id="start-audio" class="button">Start audio output</button>
      <p class="muted small">The Default Stem Pack uses four smoothly mixed layers. Audio playback requires one click in this tab.</p>
    </main>
    <script type="module" src="/src/output.ts"></script>
  </body>
</html>
